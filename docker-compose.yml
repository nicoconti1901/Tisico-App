services:
  postgres:
    image: postgres:16-alpine
    container_name: tisico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tisico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tisico_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tisico}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tisico} -d ${POSTGRES_DB:-tisico}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tisico-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tisico_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tisico_minio_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: tisico-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'Esperando MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set download local/$${MINIO_BUCKET}/public;
      echo 'Bucket listo';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tisico_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tisico_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-tisico-uploads}

volumes:
  postgres_data:
  minio_data:
